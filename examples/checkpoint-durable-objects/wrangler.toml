name = "checkpoint-do-example"
main = "src/index.ts"
compatibility_date = "2026-04-07"

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = true

[ai]
binding = "AI"

[[durable_objects.bindings]]
name = "CHAT"
class_name = "ChatDO"

[[durable_objects.bindings]]
name = "REGISTRY"
class_name = "RegistryDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ChatDO"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["RegistryDO"]
