# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch: # Allows triggering the workflow manually in GitHub UI

permissions:
  contents: read

# If another push to the same PR or branch happens while this workflow is still running,
# cancel the earlier run in favor of the next run.
#
# There's no point in testing an outdated version of the code. GitHub only allows
# a limited number of job runners to be active at the same time, so it's better to cancel
# pointless jobs early so that more useful jobs can run sooner.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22.14.0"

jobs:
  # ============================================
  # Stage 1: Static checks + Build (all run in parallel)
  # ============================================
  lint:
    name: Check linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check linting
        run: pnpm lint

  format:
    name: Check formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Create build archive
        run: tar -czf build-artifacts.tar.gz libs/*/dist libs/*/.turbo .turbo 2>/dev/null || tar -czf build-artifacts.tar.gz libs/*/dist

      - name: Publish to pkg.pr.new
        if: ${{ github.event_name == 'pull_request' }}
        run: pnpm dlx pkg-pr-new publish './libs/*'
        continue-on-error: true

      - name: Upload build artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v4
        with:
          name: build-artifacts
          path: build-artifacts.tar.gz
          retention-days: 1

  # ============================================
  # Stage 2: Tests (require build + all static checks to pass)
  # ============================================
  test:
    name: Unit Tests
    needs: [lint, format, build]
    strategy:
      matrix:
        # See Node.js release schedule at https://nodejs.org/en/about/releases/
        os: [ubuntu-latest]
        node-version: [20.x, "22.14.0"]
        include:
          - os: windows-latest
            node-version: "22.14.0"
          - os: macos-latest
            node-version: "22.14.0"
    runs-on: ${{ matrix.os }}
    env:
      PUPPETEER_SKIP_DOWNLOAD: "true"
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "true"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4
        with:
          name: build-artifacts
      - name: Extract build artifacts
        run: tar -xzf build-artifacts.tar.gz
        shell: bash
      - name: Test
        # Run non-browser tests directly with pnpm, bypassing turbo's build
        # dependency since build artifacts are already extracted.
        # Browser tests (sdk-react, sdk-angular, sdk-vue, sdk-svelte) run in
        # a dedicated job to avoid Chrome connection timeouts.
        run: pnpm -r --if-present --filter='!@langchain/react' --filter='!@langchain/angular' --filter='!@langchain/vue' --filter='!@langchain/svelte' run test

  browser-tests:
    name: Browser Tests
    needs: [lint, format, build]
    uses: ./.github/workflows/test-browser.yml
    with:
      artifact-name: build-artifacts

  # ============================================
  # Stage 2: Environment/Export Tests (separate workflow)
  # ============================================
  environment-tests:
    name: Environment Tests
    needs: [lint, format, build]
    uses: ./.github/workflows/test-exports.yml
    with:
      artifact-name: build-artifacts
