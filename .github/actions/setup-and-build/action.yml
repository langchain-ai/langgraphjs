name: "Setup and Build"
description: "Checkout, install pnpm/node, install deps, and restore or create build artifacts"

inputs:
  node-version:
    description: "Node.js version to use"
    required: false
    default: "22.14.0"
  artifact-name:
    description: "Name of the build artifact to download (skips build if provided)"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4
    - name: Use Node.js ${{ inputs.node-version }}
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: "pnpm"
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      shell: bash
    - name: Download build artifacts
      if: inputs.artifact-name != ''
      uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v4
      with:
        name: ${{ inputs.artifact-name }}
    - name: Extract build artifacts
      if: inputs.artifact-name != ''
      run: tar -xzf build-artifacts.tar.gz
      shell: bash
    - name: Build dependencies
      if: inputs.artifact-name == ''
      run: pnpm build
      shell: bash
